name: 缩量回踩中轨顺势买点策略
display_name: 缩量回踩中轨
description: 适用于处于多头趋势中的个股，在强势板块中寻找缩量回调至关键支撑位的介入机会。

# 策略分类：trend（趋势）、pattern（形态）、reversal（反转）、framework（框架）
category: trend

# 关联的核心交易理念编号（1-7），可选
# 1: 顺势而为，2: 风险控制优先
core_rules: [1, 2]

# 策略需要使用的工具列表，可选
required_tools:
  - get_daily_history
  - analyze_trend
  - get_sector_rankings
  - search_stock_news
  - get_realtime_quote

# 策略详细说明（自然语言，支持 Markdown 格式）
instructions: |
  **缩量回踩中轨顺势买点策略**

  本策略旨在捕捉强势多头趋势中的健康回调买点。其核心逻辑是：标的处于明确的多头趋势中，在上涨过程中缩量回踩“布林带中轨”与“20日均线”重合的关键技术支撑位，且上升动量（MACD）未破坏，是潜在的高盈亏比介入时机。**使用本策略前，需通过其他方式确认标的所属板块热度（如市场关注度、资金流入）排名靠前。**

  ### 判断标准：

  1.  **趋势与结构条件**：
      - 使用 `analyze_trend` 函数，确认中短期均线（如5， 10， 20日）呈多头排列，或至少20日均线明确向上。
      - 布林带中轨数值与20日均线数值接近（例如，偏差在0.5%以内），表明两者形成共振支撑。
      - 当前K线（或近期K线）的最低价/收盘价已回踩或轻微跌破布林带中轨。

  2.  **技术指标与量能条件**：
      - MACD指标（参数可设为12，26，9）的DIFF线位于0轴上方，表明整体趋势偏多。
      - 当前交易日的成交量，较前几个交易日（如前5日）的平均成交量显著萎缩（例如，缩量至均量的70%以下），表明抛压暂时衰竭。

  ### 评分调整与操作建议：
  - **触发信号**：当**条件1（趋势与结构）** 与**条件2（指标与量能）** 同时满足时，策略发出看多信号。
  - **Sentiment Score调整**：满足全部核心条件时，`sentiment_score` 建议**上调 +3**。
  - **买入理由**：在生成的 `buy_reason` 中，请注明：**“触发【缩量回踩中轨】策略：多头趋势中，股价缩量回踩Boll中轨&20日线共振支撑，MACD位于0轴上。”**